name: SyphonOut
options:
  bundleIdPrefix: com.syphonout
  deploymentTarget:
    macOS: "12.0"
  xcodeVersion: "15"
  generateEmptyDirectories: true

settings:
  base:
    PRODUCT_NAME: SyphonOut
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "12.0"
    ARCHS: "arm64 x86_64"
    ONLY_ACTIVE_ARCH: NO
    CODE_SIGN_STYLE: Manual
    CODE_SIGNING_REQUIRED: NO
    CODE_SIGNING_ALLOWED: NO

targets:
  SyphonOut:
    type: application
    platform: macOS
    deploymentTarget: "12.0"

    info:
      path: SyphonOut/App/Info.plist
      properties:
        LSUIElement: false
        CFBundleName: SyphonOut
        CFBundleIdentifier: com.syphonout.SyphonOut
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
        LSMinimumSystemVersion: "12.0"
        NSHighResolutionCapable: true
        NSPrincipalClass: NSApplication

    entitlements:
      path: SyphonOut/App/SyphonOut.entitlements
      properties:
        com.apple.security.app-sandbox: false

    sources:
      - path: SyphonOut
        excludes:
          - App/Info.plist
          - App/SyphonOut.entitlements
          - App/main.m
          - Syphon/SyphonOut-Bridging-Header.h
          # Deleted legacy files — excluded so xcodegen doesn't warn
          - Syphon/SyphonBridge.h
          - Syphon/SyphonBridge.m
          - Syphon/SyphonClientWrapper.swift
          - Syphon/SyphonServerDescription.swift
          - Syphon/SyphonServerDiscovery.swift
          - Output/OutputController.swift
          - Output/OutputManager.swift
          - Output/OutputMode.swift
          - Metal/MetalRenderer.swift
      - path: SyphonOut/App/main.m

    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.syphonout.SyphonOut
        INFOPLIST_FILE: SyphonOut/App/Info.plist
        CODE_SIGN_ENTITLEMENTS: SyphonOut/App/SyphonOut.entitlements
        SWIFT_OBJC_BRIDGING_HEADER: SyphonOut/Syphon/SyphonOut-Bridging-Header.h
        # Library search path for libsyphonout_core.a
        HEADER_SEARCH_PATHS:
          - "$(PROJECT_DIR)/SyphonOut/Bridging"   # syphonout_core.h
          - "$(PROJECT_DIR)/SyphonOut/Syphon"     # SyphonNative.h
          - "$(PROJECT_DIR)/SyphonOut/SOLink"     # SOLinkClient.h
          - "$(inherited)"
        LIBRARY_SEARCH_PATHS:
          - "$(PROJECT_DIR)/SyphonOut/Bridging"
          - "$(inherited)"
        # Link the Rust static library + required system frameworks
        OTHER_LDFLAGS:
          - "-lsyphonout_core"
          - "-lc++"
          - "-framework Metal"
          - "-framework CoreVideo"
          - "-framework IOSurface"
          - "-framework QuartzCore"
          - "$(inherited)"
        # No Syphon.framework at compile time — loaded via dlopen at runtime
        # Suppress OpenGL deprecation (CGLCreateContext for Syphon's internal use)
        GCC_WARN_ABOUT_DEPRECATED_FUNCTIONS: NO
        CLANG_WARN_DEPRECATED_OBJC_IMPLEMENTATIONS: NO

    preBuildScripts:
      - name: "Build Rust core (libsyphonout_core.a)"
        script: |
          set -e
          export PATH="$HOME/.cargo/bin:/usr/local/bin:$PATH"
          cd "$SRCROOT/core"
          cargo build --release
          cp -f target/release/libsyphonout_core.a "$SRCROOT/SyphonOut/Bridging/libsyphonout_core.a"
          echo "✅ libsyphonout_core.a copied to SyphonOut/Bridging/"
        basedOnDependencyAnalysis: false

    # No framework dependencies — Syphon is dlopen'd, Metal/IOSurface linked via OTHER_LDFLAGS
    dependencies: []
