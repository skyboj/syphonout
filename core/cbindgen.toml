documentation = true
documentation_style = "c99"
tab_width = 4

[enum]
rename_variants = "ScreamingSnakeCase"
prefix_with_name = true

[export]
# Export C-compatible enums and structs for FFI
include = [
    "SyphonOutMode",
    "SyphonOutIcon",
    "SyphonOutSignal",
    "SyphonOutServerInfo",
    "ServerDescription",
]
# All pub extern "C" functions are exported automatically
