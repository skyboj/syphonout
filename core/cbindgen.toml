language = "C"
include_guard = "SYPHONOUT_CORE_H"
autogen_warning = "/* Auto-generated by cbindgen. Do not edit manually. */"
documentation = true
documentation_style = "c99"
tab_width = 4

[enum]
rename_variants = "ScreamingSnakeCase"
prefix_with_name = true

[export]
# Export all public functions and types with C-compatible names
include = [
    "SyphonOutMode",
    "SyphonOutIconState",
    "SyphonOutSignalStatus",
    "SyphonOutServerInfo",
]
# By default, cbindgen exports all pub extern "C" functions.
# We only need to explicitly include the types we want to be exported
# as structs/enums.
